# Ouvrage — production compose file
#
# Usage:
#   ./setup.sh        # first-time setup (interactive)
#   docker compose up -d

services:
  ouvrage:
    build: .
    container_name: ouvrage
    restart: unless-stopped
    ports:
      - "8100:8100"

    # --- Linux capabilities ---
    # Required: the app spawns CC worker processes as a separate OS user
    # (ouvrage) via os.setuid(). Without these, task dispatch fails.
    cap_add:
      - SETUID
      - SETGID
      - KILL

    volumes:
      - ./data:/data                                     # SQLite DB, OAuth RSA key, state
      - ./work:/work                                     # Git bare repos and worktrees
      - ./claude-auth:/home/ouvrage/.claude              # Claude Code auth persistence
      - ./gitconfig:/home/ouvrage/.gitconfig:ro          # Worker git identity

    secrets:
      - master_key
      - openai_key

    env_file:
      - .env

    # All defaults (DB path, OAuth key path, worker user, port, AUTH_MODE)
    # come from the Dockerfile's ENV directive. Override anything via .env;
    # the most common one is OUVRAGE_PUBLIC_URL when running behind ngrok or
    # a reverse proxy. See .env.example for the full list.

secrets:
  master_key:
    file: ./secrets/master_key
  openai_key:
    file: ./secrets/openai_key
