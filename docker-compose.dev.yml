# Ouvrage — dev compose file (standalone, not an overlay).
#
# Usage:
#   make docker-dev
# Or:
#   docker compose -f docker-compose.dev.yml up
#
# Bind-mounts the host source tree into the container so edits appear
# immediately. Restart the container to pick up changes:
#   docker compose -f docker-compose.dev.yml restart ouvrage
#
# NOT FOR PRODUCTION. Skips the prod image's privilege separation and
# file lockdown so the mounted source stays readable.

services:
  ouvrage:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: ouvrage:dev
    container_name: ouvrage-dev
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - ./ouvrage:/app/ouvrage
      - ./dashboard:/app/dashboard
      - ./index.html:/app/index.html
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./fixtures:/app/fixtures
      - ./hooks:/app/hooks
      - ./.claude:/app/.claude
      - ./CLAUDE.md:/app/CLAUDE.md
      - ./conftest.py:/app/conftest.py
      - ./pytest.ini:/app/pytest.ini
      - ouvrage-dev-data:/data
      - ouvrage-dev-work:/work
    environment:
      PORT: "8100"
      OUVRAGE_DB: /data/ouvrage.db
      OAUTH_RSA_KEY_PATH: /data/oauth_rsa_key.pem
      AUTH_MODE: local
      # Master key: host env if set, else Dockerfile.dev generates ephemeral.
      OUVRAGE_MASTER_KEY: "${OUVRAGE_MASTER_KEY:-}"

volumes:
  ouvrage-dev-data:
  ouvrage-dev-work:
