name: test

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token for public-repo PRs. Override per-job if a task
# ever needs to write (none do today).
permissions:
  contents: read

# Cancel superseded runs on the same ref — saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[dev]'

      - name: Run tests
        env:
          OUVRAGE_MASTER_KEY: ""  # conftest.py auto-generates a Fernet key per test
        run: |
          python3 -m pytest tests/ -q --tb=short
