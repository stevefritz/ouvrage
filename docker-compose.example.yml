# Ouvrage — example single-tenant deployment
#
# Usage:
#   docker compose -f docker-compose.example.yml up -d
#
# This runs Ouvrage with AUTH_MODE=local (built-in login page).
# For SaaS mode, uncomment the control plane env vars below.

services:
  ouvrage:
    image: ouvrage:latest
    build: .
    container_name: ouvrage
    restart: unless-stopped
    ports:
      - "8100:8100"

    # --- Linux capabilities ---
    # Required: the app spawns CC worker processes as a separate OS user
    # (switchboard) via os.setuid(). Without these, task dispatch fails.
    cap_add:
      - SETUID
      - SETGID
      - KILL

    volumes:
      - ouvrage-data:/data    # SQLite DB, OAuth RSA key, state
      - ouvrage-work:/work    # Git bare repos and worktrees

    # --- Docker secrets (recommended for production) ---
    # The master encryption key protects stored credentials (GitHub PATs, API keys).
    # Using Docker secrets keeps it out of `docker inspect` and env dumps.
    secrets:
      - master_key

    environment:
      # --- Core ---
      PORT: "8100"
      OUVRAGE_DB: /data/ouvrage.db
      OAUTH_RSA_KEY_PATH: /data/oauth_rsa_key.pem
      WORKER_USER: switchboard

      # --- Auth mode ---
      # "local" = built-in login page (default, no control plane needed)
      # "saas"  = SSO via control plane redirect
      AUTH_MODE: local

      # --- Local auth: owner bootstrap (first boot only) ---
      # Uncomment to auto-create the owner user on first start.
      # After first boot these can be removed.
      # OUVRAGE_OWNER_EMAIL: admin@example.com
      # OUVRAGE_OWNER_NAME: Admin
      # OUVRAGE_OWNER_PASSWORD_HASH: "$argon2id$..."

      # --- SaaS mode (uncomment when connecting to control plane) ---
      # CONTROL_PLANE_URL: https://ouvrage.build
      # CONTROL_PLANE_JWKS: https://ouvrage.build/api/auth/.well-known/jwks.json
      # INSTANCE_SLUG: acme
      # INTERNAL_API_TOKEN: <shared-secret-from-control-plane>
      # MAX_PROJECTS: 0

      # --- OAuth (for MCP client connections like Claude.ai) ---
      # AUTH_ISSUER_URL: https://acme.ouvrage.build
      # OAUTH_BASE_URL: https://acme.ouvrage.build
      # RESOURCE_URL: https://acme.ouvrage.build/mcp

      # --- Customer credentials (pushed via POST /internal/config in SaaS) ---
      # ANTHROPIC_API_KEY: <customer-provides>

      # --- Optional ---
      # OPENAI_API_KEY: <for-semantic-search-embeddings>
      # VAPID_PRIVATE_KEY: <for-web-push>
      # VAPID_PUBLIC_KEY: <for-web-push>

    # --- Networking ---
    # In SaaS deployments, the control plane needs to reach /internal/* endpoints.
    # Add both containers to a shared Docker network:
    #
    # networks:
    #   - ouvrage-internal
    #
    # The control plane calls POST /internal/config and POST /internal/bootstrap-user
    # over this network. Caddy on the host should NOT proxy /internal/* to the public.

secrets:
  master_key:
    # Create with: echo "your-fernet-key" > ./secrets/master_key
    # Generate key: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    file: ./secrets/master_key

volumes:
  ouvrage-data:
  ouvrage-work:

# Uncomment for SaaS control plane connectivity:
# networks:
#   ouvrage-internal:
#     external: true
