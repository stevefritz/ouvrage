<!DOCTYPE html>
<html lang="en" class="bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switchboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- Nav -->
    <nav class="border-b border-slate-800 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <a href="#/" class="text-lg font-bold tracking-wide text-slate-100">SWITCHBOARD</a>
            <a href="#/" data-nav="board" class="text-sm text-slate-100 hover:text-slate-200">Board</a>
            <a href="#/conversations" data-nav="conversations" class="text-sm text-slate-400 hover:text-slate-200">Conversations</a>
            <a href="#/projects" data-nav="projects" class="text-sm text-slate-400 hover:text-slate-200">Projects</a>
        </div>
        <div class="flex items-center gap-4 text-sm text-slate-400">
            <span id="header-active">—</span>
            <span id="header-cost">—</span>
        </div>
    </nav>

    <!-- Board View -->
    <div id="view-board" class="hidden p-6">
        <div class="flex items-center gap-4 mb-4">
            <select id="filter-status" class="bg-slate-800 border border-slate-700 rounded px-3 py-1.5 text-sm text-slate-300">
                <option value="">All statuses</option>
            </select>
            <select id="filter-project" class="bg-slate-800 border border-slate-700 rounded px-3 py-1.5 text-sm text-slate-300">
                <option value="">All projects</option>
            </select>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-slate-800 text-xs text-slate-500 uppercase">
                        <th class="p-3 text-left w-28">Status</th>
                        <th class="p-3 text-left">Task</th>
                        <th class="p-3 text-left w-40">Progress</th>
                        <th class="p-3 text-left w-20">Cost</th>
                        <th class="p-3 text-left w-24">Activity</th>
                        <th class="p-3 text-left w-24">Actions</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    <tr><td colspan="6" class="p-8 text-center text-slate-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Task Detail View -->
    <div id="view-detail" class="hidden p-6">
        <div class="mb-4">
            <a href="#/" class="text-sm text-slate-400 hover:text-slate-200">← Board</a>
        </div>

        <!-- Header -->
        <div id="detail-header" class="bg-slate-900 border border-slate-800 rounded-lg p-4 mb-4">
            <p class="text-slate-500">Loading...</p>
        </div>

        <!-- Checklist -->
        <div id="detail-checklist" class="bg-slate-900 border border-slate-800 rounded-lg p-4 mb-4">
            <p class="text-slate-500">Loading...</p>
        </div>

        <!-- Plan (populated by JS if plan message exists) -->
        <div id="detail-plan"></div>

        <!-- Messages -->
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 mb-4">
            <h3 class="text-sm font-medium text-slate-300 mb-3">Messages</h3>
            <div id="detail-messages">
                <p class="text-slate-500 text-sm">Loading...</p>
            </div>

            <!-- Message input -->
            <form id="message-form" class="mt-4 border-t border-slate-700 pt-3">
                <div class="flex gap-2">
                    <select id="message-type" class="bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm text-slate-300 w-28">
                        <option value="review">Review</option>
                        <option value="note">Note</option>
                        <option value="answer">Answer</option>
                    </select>
                    <input id="message-input" type="text" placeholder="Post a message..."
                        class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-1.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-slate-500">
                    <button type="submit" class="px-4 py-1.5 text-sm rounded bg-blue-600 text-white hover:bg-blue-500">Send</button>
                </div>
            </form>
        </div>

        <!-- Session Log -->
        <div class="bg-slate-900 border border-slate-800 rounded-lg mb-4">
            <button id="session-log-toggle" class="w-full flex items-center justify-between px-4 py-3 text-sm text-slate-300 hover:text-slate-100">
                <span>Session Log</span>
                <span class="text-slate-500">▸</span>
            </button>
            <div id="session-log-content" class="hidden px-4 pb-3 max-h-96 overflow-y-auto font-mono">
            </div>
        </div>

        <!-- Dispatch Log -->
        <div class="bg-slate-900 border border-slate-800 rounded-lg mb-4">
            <button id="dispatch-log-toggle" class="w-full flex items-center justify-between px-4 py-3 text-sm text-slate-300 hover:text-slate-100">
                <span>Dispatch Log</span>
                <span class="text-slate-500">▸</span>
            </button>
            <div id="dispatch-log-content" class="hidden px-4 pb-3 max-h-96 overflow-y-auto font-mono">
            </div>
        </div>
    </div>

    <!-- Conversations View -->
    <div id="view-conversations" class="hidden p-6">
        <h2 class="text-lg font-medium text-slate-200 mb-4">Conversations</h2>
        <div id="conversations-list">
            <p class="text-slate-500">Loading...</p>
        </div>
    </div>

    <!-- Conversation Detail View -->
    <div id="view-conversation-detail" class="hidden p-6">
        <div class="mb-4">
            <a href="#/conversations" class="text-sm text-slate-400 hover:text-slate-200">&larr; Conversations</a>
        </div>
        <div id="conversation-header" class="bg-slate-900 border border-slate-800 rounded-lg p-4 mb-4">
            <p class="text-slate-500">Loading...</p>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
            <h3 class="text-sm font-medium text-slate-300 mb-3">Messages</h3>
            <div id="conversation-messages">
                <p class="text-slate-500 text-sm">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Projects View -->
    <div id="view-projects" class="hidden p-6">
        <h2 class="text-lg font-medium text-slate-200 mb-4">Projects</h2>
        <div id="projects-list" class="grid gap-4">
            <p class="text-slate-500">Loading...</p>
        </div>
    </div>

    <script type="module" src="/dashboard/app.js"></script>
</body>
</html>
