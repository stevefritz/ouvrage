<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switchboard</title>
    <!-- Foreman fonts: DM Sans (body) + JetBrains Mono (code/IDs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="/dashboard/style.css">
    <script>
        // Apply saved theme before paint to prevent flash
        (function() {
            var theme = localStorage.getItem('switchboard-theme') || 'dark';
            if (theme === 'light') document.documentElement.classList.add('theme-light');
        })();
    </script>
</head>
<body class="min-h-screen" style="background: var(--bg-primary); color: var(--text-primary);">
    <div id="app"></div>
    <script type="module" src="/dashboard/app.js"></script>
</body>
</html>
